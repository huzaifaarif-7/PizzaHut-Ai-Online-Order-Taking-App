<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Hut · Voice Ordering</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script type="module">
    import VapiClient from 'https://esm.sh/@vapi-ai/web@2.5.2/es2022/web.bundle.mjs';
    window.__VapiClientPromise = Promise.resolve(VapiClient);
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #160A0B;
      --surface: #241315;
      --surface-2: #2C171A;
      --line: rgba(255, 226, 224, 0.10);
      --line-strong: rgba(255, 226, 224, 0.17);
      --text: #F7EEEC;
      --muted: rgba(247, 238, 236, 0.74);
      --faint: rgba(247, 238, 236, 0.56);
      --dim: rgba(247, 238, 236, 0.40);
      --red: #E63B33;
      --red-soft: rgba(230, 59, 51, 0.16);
      --red-line: rgba(230, 59, 51, 0.34);
      --maroon: #5C1418;
      --green: #5BE08C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background:
        radial-gradient(1200px 620px at 50% -12%, rgba(168, 30, 34, 0.34), transparent 62%),
        radial-gradient(900px 520px at 102% 112%, rgba(92, 20, 24, 0.32), transparent 60%),
        linear-gradient(180deg, #1C0D0E 0%, #150809 60%, #120708 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    h1,
    h2,
    h3,
    .font-display {
      font-family: 'Inter Tight', 'Inter', sans-serif;
      letter-spacing: -0.025em;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0;
      font-feature-settings: "tnum" 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line-strong);
      border-radius: 4px;
    }

    /* Animations — restrained */
    @keyframes pulse-ring {
      0% {
        transform: translateX(-50%) scale(1);
        opacity: 0.5;
      }

      100% {
        transform: translateX(-50%) scale(1.7);
        opacity: 0;
      }
    }

    @keyframes soundwave {

      0%,
      100% {
        transform: scaleY(0.35);
      }

      50% {
        transform: scaleY(1);
      }
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .pulse-ring {
      animation: pulse-ring 1.6s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    .chat-bubble {
      animation: float-in 0.3s ease forwards;
    }

    .bar {
      animation: soundwave 0.8s ease-in-out infinite;
    }

    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.1s; }
    .bar:nth-child(5) { animation-delay: 0s; }

    .dot-blink {
      animation: blink 1.2s ease infinite;
    }

    /* Surfaces — flat, hairline, no glow */
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .panel-2 {
      background: var(--surface-2);
      border: 1px solid var(--line);
    }

    .panel-red {
      background: var(--red-soft);
      border: 1px solid var(--red-line);
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .mic-btn-idle,
    .mic-btn-connected,
    .mic-btn-speaking,
    .mic-btn-listening {
      background: var(--red);
    }

    /* Blink red to invite the user to tap/speak — until they actually start speaking */
    @keyframes mic-blink {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(230, 59, 51, 0.6);
        background: var(--red);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(230, 59, 51, 0);
        background: #C32E27;
      }
    }

    .mic-btn-idle,
    .mic-btn-connected {
      animation: mic-blink 1.25s ease-in-out infinite;
    }

    /* Empty-state mic icon in the conversation panel — blink red to invite a tap */
    @keyframes mic-icon-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .mic-icon-blink {
      color: var(--red);
      animation: mic-icon-blink 1.25s ease-in-out infinite;
    }

    .mic-btn-listening {
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.18) inset;
    }

    .mic-btn-processing {
      background: var(--surface-2);
      border: 1px solid var(--line-strong);
    }

    .scrollable {
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .chat-scroll {
      max-height: 380px;
    }

    /* Main two-column layout — collapses to one column on tablets/phones.
       CSS (not window.innerWidth) so it reacts to resize and orientation. */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .chat-scroll {
        max-height: 300px;
      }
    }

    /* Phone tweaks: tighter gutters, comfortable tap targets, no overflow. */
    @media (max-width: 600px) {
      .app-shell {
        padding: 18px 14px 14px !important;
      }
      .chat-scroll {
        max-height: 46vh;
      }
      .chat-bubble > div {
        max-width: 86% !important;
      }
      .pill-btn {
        padding: 9px 12px;
      }
      .modal-overlay {
        padding: 12px;
      }
      .modal-card {
        max-height: 92vh;
      }
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-connected { background: var(--green); }
    .status-idle { background: var(--dim); }
    .status-listening {
      background: var(--red);
      animation: blink 0.9s ease infinite;
    }
    .status-speaking {
      background: var(--red);
      animation: blink 1.3s ease infinite;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .field-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.18s;
    }

    .field-input:focus {
      border-color: var(--red-line);
    }

    .field-input::placeholder {
      color: var(--dim);
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 8px;
      display: block;
    }

    .field-err {
      font-size: 11.5px;
      color: #FF8A82;
      margin-top: 6px;
    }

    .btn-primary {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Inter Tight', sans-serif;
      letter-spacing: -0.01em;
      transition: filter 0.15s;
    }

    .btn-primary:hover {
      filter: brightness(1.08);
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 13px 20px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-ghost:hover {
      border-color: var(--line-strong);
      color: var(--text);
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 13px;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
      white-space: nowrap;
    }

    .pill-btn:hover {
      border-color: var(--line-strong);
      color: var(--text);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 120;
      padding: 20px;
    }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
    }

    .add-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .add-btn:hover {
      border-color: var(--red-line);
      background: var(--red-soft);
    }

    .add-btn.added {
      background: var(--red);
      border-color: var(--red);
    }

    /* Menu list rows — editorial hairline list */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      transition: padding-left 0.18s;
    }

    .menu-row:last-child {
      border-bottom: none;
    }

    .menu-row:hover {
      padding-left: 4px;
    }

    /* ─── Intro animation ─────────────────────────────────────────────────────── */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background:
        radial-gradient(900px 700px at 50% 38%, rgba(176, 32, 36, 0.30), transparent 60%),
        linear-gradient(180deg, #1E0E10 0%, #140809 70%, #0F0607 100%);
      transition: opacity 0.6s ease, transform 0.6s ease;
      overflow: hidden;
    }

    .intro.leaving {
      opacity: 0;
      transform: scale(1.06);
      pointer-events: none;
    }

    .intro-skip {
      position: absolute;
      bottom: 26px;
      right: 26px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .intro-skip:hover { color: var(--muted); }

    .slice-stage {
      position: relative;
      width: 320px;
      height: 326px;
      transform-origin: 50% 26%;
      animation: slice-float 5s ease-in-out 2.7s infinite;
    }

    /* warm oven glow behind the slice */
    .slice-glow {
      position: absolute;
      left: 50%;
      top: 40%;
      width: 380px;
      height: 380px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(238, 96, 48, 0.32), transparent 60%);
      opacity: 0;
      animation: glow-in 0.9s ease 0.3s forwards;
    }

    /* ground shadow under the tip */
    .slice-shadow {
      position: absolute;
      left: 50%;
      bottom: 2px;
      width: 140px;
      height: 22px;
      transform: translateX(-50%);
      background: rgba(35, 5, 7, 0.6);
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0;
      animation: glow-in 0.7s ease 0.55s forwards;
    }

    .slice-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      height: 300px;
      transform: scale(0);
      transform-origin: 50% 7%;
    }

    /* deep-baked sauce / outer edge of the slice */
    .slice-base {
      clip-path: polygon(50% 99%, 6% 3%, 94% 3%);
      background: linear-gradient(177deg, #C42A20 0%, #8E1714 58%, #631011 100%);
      filter: drop-shadow(0 22px 24px rgba(0, 0, 0, 0.45));
      animation: slice-in 0.62s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    /* molten cheese surface with mottled melt + browned spots */
    .slice-cheese {
      clip-path: polygon(50% 93%, 11% 8%, 89% 8%);
      background:
        radial-gradient(circle at 33% 24%, rgba(255, 255, 255, 0.45), transparent 15%),
        radial-gradient(circle at 64% 38%, rgba(196, 132, 48, 0.55), transparent 17%),
        radial-gradient(circle at 44% 60%, rgba(196, 132, 48, 0.5), transparent 18%),
        radial-gradient(circle at 56% 78%, rgba(170, 110, 40, 0.45), transparent 16%),
        linear-gradient(178deg, #FCE7A8 0%, #F2CB6B 52%, #E1AC4E 100%);
      animation: slice-in 0.56s cubic-bezier(0.22, 1, 0.36, 1) 0.44s forwards, bake-glow 1.3s ease 2.1s;
    }

    /* glossy light sweep across the cheese after assembly */
    .slice-gloss {
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      height: 300px;
      clip-path: polygon(50% 93%, 11% 8%, 89% 8%);
      background: linear-gradient(115deg, transparent 42%, rgba(255, 255, 255, 0.42) 50%, transparent 58%);
      background-size: 260% 100%;
      background-position: 150% 0;
      opacity: 0;
      pointer-events: none;
      animation: gloss-sweep 1.3s ease 2.0s;
    }

    /* puffed crust along the wide top edge */
    .slice-crust {
      position: absolute;
      top: -3px;
      left: 5%;
      width: 90%;
      height: 40px;
      border-radius: 26px;
      background: linear-gradient(180deg, #EEBA67 0%, #D5953F 52%, #AE712E 100%);
      box-shadow:
        inset 0 3px 6px rgba(255, 226, 170, 0.55),
        inset 0 -7px 13px rgba(110, 60, 15, 0.5),
        0 6px 14px rgba(0, 0, 0, 0.4);
      transform: scaleX(0);
      transform-origin: center;
      z-index: 4;
      animation: crust-in 0.5s cubic-bezier(0.34, 1.4, 0.5, 1) 0.1s forwards;
    }

    .topping {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 6;
    }

    .topping .chip {
      opacity: 0;
      animation: topping-drop 0.7s cubic-bezier(0.34, 1.3, 0.5, 1) forwards;
      transform-origin: center bottom;
    }

    .topping .chip-shadow {
      position: absolute;
      left: 50%;
      top: 60%;
      width: 110%;
      height: 34%;
      border-radius: 50%;
      background: rgba(60, 10, 10, 0.5);
      filter: blur(3px);
      transform: translate(-50%, 0) scale(0.3);
      opacity: 0;
      animation: shadow-in 0.7s ease forwards;
    }

    /* pepperoni — crisped cupped edge, glossy center, char spots */
    .pep {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 32%, #F58163 0%, #DB4330 38%, #B12C1F 72%, #8E2017 100%);
      box-shadow:
        inset 0 0 0 2px rgba(120, 28, 16, 0.45),
        inset 0 -3px 6px rgba(80, 12, 8, 0.6),
        inset 0 3px 6px rgba(255, 190, 160, 0.5),
        0 2px 4px rgba(50, 8, 6, 0.4);
      position: relative;
    }
    .pep::before, .pep::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(110, 22, 12, 0.6);
    }
    .pep::before { width: 6px; height: 6px; top: 6px; left: 18px; }
    .pep::after { width: 4px; height: 4px; top: 18px; left: 7px; }

    .basil {
      width: 22px;
      height: 26px;
      background: radial-gradient(circle at 38% 28%, #6CC65F, #2E7D32 82%);
      border-radius: 0 50% 0 50%;
      box-shadow: inset 0 0 5px rgba(18, 64, 20, 0.55), 0 1px 3px rgba(20, 50, 15, 0.4);
      position: relative;
    }
    .basil::after {
      content: '';
      position: absolute;
      left: 50%; top: 12%;
      width: 1.5px; height: 70%;
      background: rgba(225, 255, 220, 0.55);
      transform: translateX(-50%) rotate(45deg);
      transform-origin: center;
    }

    .pepper {
      width: 18px;
      height: 11px;
      border-radius: 8px;
      background: radial-gradient(circle at 34% 28%, #88D957, #4E9E2E 92%);
      box-shadow: inset 0 -2px 4px rgba(28, 66, 18, 0.55), 0 1px 2px rgba(20, 50, 15, 0.35);
    }

    .intro-text {
      text-align: center;
      opacity: 0;
      animation: text-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 2.5s forwards;
    }

    .intro-text .line {
      width: 40px;
      height: 2px;
      background: var(--red);
      margin: 0 auto 18px;
      transform: scaleX(0);
      transform-origin: center;
      animation: line-draw 0.6s cubic-bezier(0.22, 1, 0.36, 1) 2.7s forwards;
    }

    @keyframes slice-float {
      0%, 100% { transform: translateY(0) rotate(-1.2deg); }
      50% { transform: translateY(-9px) rotate(1.5deg); }
    }
    @keyframes glow-in { to { opacity: 1; } }
    @keyframes slice-in {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes crust-in {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }
    @keyframes gloss-sweep {
      0% { background-position: 150% 0; opacity: 0; }
      18% { opacity: 1; }
      100% { background-position: -90% 0; opacity: 0; }
    }
    @keyframes topping-drop {
      0%   { transform: translateY(-340px) scale(0.85); opacity: 0; }
      8%   { opacity: 1; }
      58%  { transform: translateY(5px) scale(1); }
      72%  { transform: translateY(0) scaleX(1.18) scaleY(0.82); }
      86%  { transform: translateY(0) scaleX(0.94) scaleY(1.06); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes shadow-in {
      0%, 55% { opacity: 0; transform: translate(-50%, 0) scale(0.3); }
      72% { opacity: 0.5; transform: translate(-50%, 0) scale(1.1); }
      100% { opacity: 0.34; transform: translate(-50%, 0) scale(1); }
    }
    @keyframes bake-glow {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(238, 110, 50, 0)); }
      50% { filter: drop-shadow(0 0 22px rgba(238, 110, 50, 0.7)); }
    }
    @keyframes text-up {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes line-draw { to { transform: scaleX(1); } }

    @media (prefers-reduced-motion: reduce) {
      .slice-stage { animation: none; }
      .intro .chip, .intro .chip-shadow { animation-duration: 0.01s; }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Config ─────────────────────────────────────────────────────────────────
    const VAPI_PUBLIC_KEY = "60c45afe-2fdb-417e-96a2-bc339f725237";
    const VAPI_ASSISTANT_ID = "b76cede6-c20e-43b4-8d2a-d21b97627e37";
    const API_BASE = "/api";
    const PROFILE_KEY = "ph_profile";   // localStorage key for the saved customer profile

    // ─── Profile storage helpers ─────────────────────────────────────────────────
    const loadProfile = () => {
      try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || "null"); }
      catch { return null; }
    };
    const saveProfile = (p) => {
      try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
    };

    const fmt = (n) => typeof n === 'number' ? n.toLocaleString() : n;

    // ─── Billing constants (kept in sync with the backend /order logic) ──────────
    const TAX_RATE = 0.13;              // 13% tax
    const DELIVERY_FEE = 149;           // flat delivery fee below the free-delivery threshold
    const FREE_DELIVERY_THRESHOLD = 1500;

    // Compute a live bill from a set of cart picks ({ name, price }).
    const computeBill = (picks) => {
      const subtotal = (picks || []).reduce((s, p) => s + (Number(p.price) || 0), 0);
      const deliveryFee = subtotal === 0 ? 0 : (subtotal < FREE_DELIVERY_THRESHOLD ? DELIVERY_FEE : 0);
      const tax = Math.round(subtotal * TAX_RATE);
      const grandTotal = subtotal + deliveryFee + tax;
      return { subtotal, deliveryFee, tax, grandTotal };
    };

    // Spell a name out letter-by-letter ("Ali Khan" -> "A-L-I K-H-A-N") so the
    // voice assistant can confirm / pronounce the exact spelling from the profile.
    const spellOut = (name) => (name || '')
      .trim()
      .split(/\s+/)
      .map(word => word.split('').join('-').toUpperCase())
      .join('  ');

    // Strip the customer's name out of conversation text before it is shown.
    // Speech-to-text frequently mis-spells names (e.g. "Huzaifa" -> "Josepha"),
    // so rather than display a wrong name we remove it. Two passes:
    //   1) the exact saved name, in case STT happened to get it right;
    //   2) a capitalized token right after a greeting / self-intro cue, which is
    //      where the mis-heard name shows up ("Hi Josepha" -> "Hi").
    // Words we never strip (the assistant's own name, common non-name tokens).
    const NAME_KEEP = new Set(['there','again','back','sir','maam','madam','everyone',
      'all','welcome','to','our','your','the','sarah','pizza','hut']);
    const escapeRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const redactName = (text, known) => {
      if (!text) return text;
      let t = text;
      if (known) {
        known.trim().split(/\s+/).filter(w => w.length > 1).forEach(part => {
          t = t.replace(new RegExp(`\\b${escapeRe(part)}\\b`, 'gi'), '');
        });
      }
      t = t.replace(
        /\b(hi|hello|hey|thanks|thank you|welcome back|welcome|bye|goodbye|name is|i'm|i am|this is|it's|call me)\b([ ,]+)([A-Za-z]+)/gi,
        (m, cue, sep, word) => (/^[A-Z]/.test(word) && !NAME_KEEP.has(word.toLowerCase())) ? cue : m
      );
      // tidy up spacing / stray punctuation left where a name was removed
      return t.replace(/\s{2,}/g, ' ').replace(/\s+([,.!?])/g, '$1').replace(/,\s*,/g, ',').trim();
    };

    // ─── Icons (minimal line set, no emoji) ───────────────────────────────────────
    const Icon = ({ d, size = 18, sw = 1.6, children, ...rest }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...rest}>
        {d ? <path d={d} /> : children}
      </svg>
    );

    const MicIcon = () => (
      <Icon size={26} sw={1.6}>
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="22" />
      </Icon>
    );

    const PhoneOff = () => (
      <Icon size={16} sw={1.7}>
        <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07C9.44 16.29 8.23 15.08 7.28 13.72A19.73 19.73 0 0 1 4.21 5.09 2 2 0 0 1 6.18 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L10.68 10.94" />
        <line x1="22" y1="2" x2="2" y2="22" />
      </Icon>
    );

    // Brand mark — a clean pizza-slice glyph, not an emoji
    const SliceMark = ({ size = 18 }) => (
      <Icon size={size} sw={1.6}>
        <path d="M3.5 8.2c5.2-3.1 11.8-3.1 17 0L12 21z" />
        <path d="M3.5 8.2c-.7-1.2-.3-2.2 1-2.7C9.2 3.7 14.8 3.7 19.5 5.5c1.3.5 1.7 1.5 1 2.7" />
        <circle cx="9.5" cy="10.5" r="0.5" fill="currentColor" stroke="none" />
        <circle cx="13.5" cy="11.5" r="0.5" fill="currentColor" stroke="none" />
        <circle cx="11.5" cy="15" r="0.5" fill="currentColor" stroke="none" />
      </Icon>
    );

    const PhoneIcon = () => <Icon size={15} sw={1.6} d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z" />;
    const PinIcon = () => <Icon size={15} sw={1.6}><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></Icon>;
    const MailIcon = () => <Icon size={15} sw={1.6}><rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 6-10 7L2 6" /></Icon>;
    const ClockIcon = () => <Icon size={14} sw={1.6}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></Icon>;
    const GridIcon = () => <Icon size={15} sw={1.6}><rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" /><rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" /></Icon>;
    const UserIcon = () => <Icon size={15} sw={1.6}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></Icon>;
    const BagIcon = ({ size = 26 }) => <Icon size={size} sw={1.5}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></Icon>;

    // ─── Sound Wave ────────────────────────────────────────────────────────────
    const SoundWave = ({ active, color = "#fff" }) => (
      <div style={{ display: 'flex', alignItems: 'center', gap: '3px', height: '24px' }}>
        {[0.6, 1, 0.75, 1, 0.6].map((h, i) => (
          <div key={i} className={active ? "bar" : ""}
            style={{
              width: '3px', height: `${h * 18}px`, borderRadius: '2px',
              background: color, opacity: active ? 1 : 0.3,
              transform: active ? undefined : `scaleY(${h * 0.4})`,
              transition: 'all 0.3s ease'
            }} />
        ))}
      </div>
    );

    // ─── Typing Indicator ────────────────────────────────────────────────────────
    const TypingIndicator = () => (
      <div className="chat-bubble" style={{ display: 'flex', alignItems: 'flex-end', gap: '10px', marginBottom: '16px' }}>
        <div style={{ width: '30px', height: '30px', borderRadius: '50%', background: 'var(--surface-2)', border: '1px solid var(--line)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, fontSize: '13px', color: 'var(--red)', flexShrink: 0 }}>S</div>
        <div className="panel-2" style={{ padding: '14px 18px', borderRadius: '14px 14px 14px 4px', display: 'flex', gap: '6px', alignItems: 'center' }}>
          {[0, 0.2, 0.4].map((d, i) => (
            <div key={i} className="dot-blink" style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'var(--muted)', animationDelay: `${d}s` }} />
          ))}
        </div>
      </div>
    );

    // ─── Chat Bubble ─────────────────────────────────────────────────────────────
    const ChatBubble = ({ msg, userName }) => {
      const isUser = msg.role === 'user';
      const content = redactName(msg.content, userName);
      // If the turn was only the (mis-heard) name, there's nothing left to show.
      if (!content) return null;
      return (
        <div className="chat-bubble" style={{
          display: 'flex', alignItems: 'flex-end', gap: '10px', marginBottom: '16px',
          flexDirection: isUser ? 'row-reverse' : 'row'
        }}>
          {!isUser && (
            <div style={{ width: '30px', height: '30px', borderRadius: '50%', background: 'var(--surface-2)', border: '1px solid var(--line)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, fontSize: '13px', color: 'var(--red)', flexShrink: 0 }}>S</div>
          )}
          <div style={{
            maxWidth: '76%', padding: '11px 15px',
            borderRadius: isUser ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
            background: isUser ? 'var(--red)' : 'var(--surface-2)',
            border: isUser ? 'none' : '1px solid var(--line)',
            fontSize: '14px', lineHeight: '1.55', color: '#fff'
          }}>
            {content}
            <div className="mono" style={{ fontSize: '9.5px', opacity: 0.45, marginTop: '5px', textAlign: isUser ? 'right' : 'left' }}>
              {new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
        </div>
      );
    };

    // ─── Profile / Dashboard Card ─────────────────────────────────────────────────
    const ProfileCard = ({ profile, onEdit }) => (
      <div className="panel" style={{ borderRadius: '14px', padding: '18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
          <div style={{ width: '38px', height: '38px', borderRadius: '10px', background: 'var(--red)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Inter Tight, sans-serif', fontWeight: 700, fontSize: '16px', flexShrink: 0 }}>
            {(profile.name || 'U').trim().charAt(0).toUpperCase()}
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, fontSize: '15px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{profile.name}</div>
            <div className="mono" style={{ fontSize: '10px', color: 'var(--faint)', letterSpacing: '0.08em', textTransform: 'uppercase', marginTop: '2px' }}>Saved profile</div>
          </div>
          <button onClick={onEdit} className="pill-btn" style={{ marginLeft: 'auto', padding: '6px 12px' }}>Edit</button>
        </div>
        {[[<PhoneIcon />, profile.phone], [<PinIcon />, profile.address], [<MailIcon />, profile.email]].map(([icon, val], i) => (
          <div key={i} style={{ display: 'flex', gap: '10px', alignItems: 'flex-start', fontSize: '13px', color: 'var(--muted)', padding: '6px 0' }}>
            <span style={{ flexShrink: 0, color: 'var(--faint)', marginTop: '1px' }}>{icon}</span><span style={{ wordBreak: 'break-word' }}>{val}</span>
          </div>
        ))}
        <div style={{ marginTop: '12px', paddingTop: '12px', borderTop: '1px solid var(--line)', fontSize: '11.5px', color: 'var(--faint)', lineHeight: 1.5 }}>
          The assistant confirms your number and address by voice before placing the order.
        </div>
      </div>
    );

    // ─── Registration Modal ───────────────────────────────────────────────────────
    const RegisterModal = ({ initial, onSave, onClose, canSkip }) => {
      const [name, setName] = useState(initial?.name || '');
      const [phone, setPhone] = useState(() => (initial?.phone || '').replace(/^\+92\s?/, ''));
      const [address, setAddress] = useState(initial?.address || '');
      const [email, setEmail] = useState(initial?.email || '');
      const [err, setErr] = useState({});

      const normalizedDigits = () => phone.replace(/\D/g, '').replace(/^0/, '');

      const validate = () => {
        const e = {};
        if (!name.trim()) e.name = 'Please enter your name.';
        const digits = normalizedDigits();
        if (digits.length !== 10) e.phone = 'Enter a 10-digit number, e.g. 300 1234567.';
        if (!address.trim()) e.address = 'Please enter your delivery address.';
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) e.email = 'Enter a valid email address.';
        setErr(e);
        return Object.keys(e).length === 0;
      };

      const handleSave = () => {
        if (!validate()) return;
        onSave({
          name: name.trim(),
          phone: '+92 ' + normalizedDigits(),
          address: address.trim(),
          email: email.trim(),
        });
      };

      return (
        <div className="modal-overlay" onClick={canSkip ? onClose : undefined}>
          <div className="modal-card" style={{ maxWidth: '440px' }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: '28px 28px 8px' }}>
              <div className="eyebrow" style={{ marginBottom: '14px' }}>{initial ? 'Edit details' : 'Get started'}</div>
              <div className="font-display" style={{ fontWeight: 600, fontSize: '23px' }}>
                {initial ? 'Edit your details' : 'Welcome to Pizza Hut'}
              </div>
              <div style={{ fontSize: '13.5px', color: 'var(--muted)', marginTop: '8px', lineHeight: 1.55 }}>
                {initial
                  ? 'Update your saved info — the assistant will use it on your next order.'
                  : 'Save your details once so the assistant can confirm them by voice instead of asking each time.'}
              </div>
            </div>

            <div style={{ padding: '20px 28px 28px', display: 'flex', flexDirection: 'column', gap: '18px' }}>
              <div>
                <label className="field-label">Full Name</label>
                <input className="field-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Ali Khan" />
                {err.name && <div className="field-err">{err.name}</div>}
              </div>

              <div>
                <label className="field-label">Phone Number</label>
                <div style={{ display: 'flex' }}>
                  <span className="mono" style={{ display: 'flex', alignItems: 'center', padding: '0 13px', background: 'var(--surface-2)', border: '1px solid var(--line)', borderRight: 'none', borderRadius: '10px 0 0 10px', color: 'var(--muted)', fontSize: '13px' }}>+92</span>
                  <input
                    className="field-input"
                    style={{ borderRadius: '0 10px 10px 0' }}
                    value={phone}
                    onChange={e => setPhone(e.target.value.replace(/[^\d]/g, '').slice(0, 11))}
                    placeholder="300 1234567"
                    inputMode="numeric" />
                </div>
                {err.phone && <div className="field-err">{err.phone}</div>}
              </div>

              <div>
                <label className="field-label">Delivery Address</label>
                <textarea className="field-input" rows="2" style={{ resize: 'vertical' }} value={address} onChange={e => setAddress(e.target.value)} placeholder="House #, street, area, city" />
                {err.address && <div className="field-err">{err.address}</div>}
              </div>

              <div>
                <label className="field-label">Email</label>
                <input className="field-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@gmail.com" />
                {err.email && <div className="field-err">{err.email}</div>}
              </div>

              <div style={{ display: 'flex', gap: '10px', marginTop: '4px' }}>
                <button className="btn-primary" style={{ flex: 1 }} onClick={handleSave}>
                  {initial ? 'Save changes' : 'Save & continue'}
                </button>
                {canSkip && (
                  <button className="btn-ghost" onClick={onClose}>Skip for now</button>
                )}
              </div>
              <div style={{ fontSize: '11px', color: 'var(--faint)', textAlign: 'center', lineHeight: 1.5 }}>
                Saved on this device only. No account needed.
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Full Menu Modal ──────────────────────────────────────────────────────────
    // Unit price for a pizza given size / crust / selected add-ons — mirrors the
    // backend /order pricing (crust_prices per size, else base + crust extra).
    const pizzaUnitPrice = (pizza, size, crust, selectedAddOns, crusts) => {
      const cp = pizza.crust_prices && pizza.crust_prices[size];
      let base;
      if (cp && cp[crust] != null) {
        base = cp[crust];
      } else {
        const c = (crusts || []).find(x => x.name === crust);
        base = (pizza.prices?.[size] || 0) + (c ? c.extra_price : 0);
      }
      const addTotal = (selectedAddOns || []).reduce((s, a) => s + (a.price || 0), 0);
      return base + addTotal;
    };

    // Configurator: pick size, crust, toppings and quantity — the same choices the
    // assistant asks for, offered as an on-screen alternative.
    const PizzaConfigurator = ({ pizza, crusts, addOns, onAdd, onClose }) => {
      const sizes = Object.keys(pizza.prices || { Medium: 0 });
      const crustNames = (crusts && crusts.length ? crusts.map(c => c.name) : ['Pan']);
      const [size, setSize] = useState(sizes.includes('Medium') ? 'Medium' : sizes[0]);
      const [crust, setCrust] = useState(crustNames.includes('Pan') ? 'Pan' : crustNames[0]);
      const [selected, setSelected] = useState([]);   // selected add-on objects
      const [quantity, setQuantity] = useState(1);

      const toggleAddOn = (a) => setSelected(prev =>
        prev.some(x => x.name === a.name) ? prev.filter(x => x.name !== a.name) : [...prev, a]);

      const unit = pizzaUnitPrice(pizza, size, crust, selected, crusts);
      const lineTotal = unit * quantity;

      const Pill = ({ active, onClick, children, sub }) => (
        <button
          onClick={onClick}
          style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px',
            padding: '9px 14px', borderRadius: '11px', cursor: 'pointer',
            border: `1px solid ${active ? 'var(--red)' : 'var(--line)'}`,
            background: active ? 'rgba(228,30,38,0.08)' : 'var(--surface-2)',
            color: active ? 'var(--red)' : 'var(--text)', fontSize: '13px', fontWeight: 500,
            transition: 'all .12s',
          }}>
          {children}
          {sub != null && <span className="mono" style={{ fontSize: '10.5px', color: active ? 'var(--red)' : 'var(--faint)' }}>{sub}</span>}
        </button>
      );

      const Group = ({ label, children }) => (
        <div style={{ marginBottom: '18px' }}>
          <div className="eyebrow" style={{ marginBottom: '10px' }}>{label}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>{children}</div>
        </div>
      );

      const confirm = () => {
        const addNames = selected.map(a => a.name);
        const id = `${pizza.id}|${size}|${crust}|${addNames.slice().sort().join('+')}`;
        const display = [pizza.name, size, crust, ...addNames].join(' · ');
        onAdd({ id, baseId: pizza.id, baseName: pizza.name, name: display, size, crust, addOns: addNames, unitPrice: unit, quantity, price: lineTotal });
        onClose();
      };

      return (
        <div className="modal-overlay" style={{ zIndex: 30 }} onClick={onClose}>
          <div className="modal-card" style={{ maxWidth: '440px', display: 'flex', flexDirection: 'column' }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: '22px 24px 16px', borderBottom: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: '12px' }}>
              <div style={{ flex: 1 }}>
                <div className="font-display" style={{ fontWeight: 600, fontSize: '18px' }}>{pizza.name}</div>
                {pizza.description && <div style={{ fontSize: '12px', color: 'var(--faint)', marginTop: '3px' }}>{pizza.description}</div>}
              </div>
              <button className="add-btn" onClick={onClose} title="Back">✕</button>
            </div>

            <div className="scrollable" style={{ padding: '20px 24px', flex: 1, overflowY: 'auto' }}>
              <Group label="Size">
                {sizes.map(s => <Pill key={s} active={size === s} onClick={() => setSize(s)} sub={`Rs ${fmt(pizza.prices?.[s] || 0)}`}>{s}</Pill>)}
              </Group>
              <Group label="Crust">
                {crustNames.map(cn => {
                  const cp = pizza.crust_prices && pizza.crust_prices[size];
                  const cObj = (crusts || []).find(c => c.name === cn);
                  const price = cp && cp[cn] != null ? cp[cn] : (pizza.prices?.[size] || 0) + (cObj ? cObj.extra_price : 0);
                  return <Pill key={cn} active={crust === cn} onClick={() => setCrust(cn)} sub={`Rs ${fmt(price)}`}>{cn}</Pill>;
                })}
              </Group>
              {addOns.length > 0 && (
                <Group label="Toppings & extras">
                  {addOns.map(a => (
                    <Pill key={a.name} active={selected.some(x => x.name === a.name)} onClick={() => toggleAddOn(a)} sub={`+Rs ${fmt(a.price)}`}>{a.name}</Pill>
                  ))}
                </Group>
              )}
              <div style={{ marginBottom: '4px' }}>
                <div className="eyebrow" style={{ marginBottom: '10px' }}>Quantity</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                  <button className="add-btn" onClick={() => setQuantity(q => Math.max(1, q - 1))} title="Less">−</button>
                  <span className="mono" style={{ fontSize: '16px', minWidth: '22px', textAlign: 'center' }}>{quantity}</span>
                  <button className="add-btn" onClick={() => setQuantity(q => q + 1)} title="More">+</button>
                </div>
              </div>
            </div>

            <div style={{ borderTop: '1px solid var(--line)', padding: '16px 24px', display: 'flex', alignItems: 'center', gap: '14px' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: '11px', color: 'var(--faint)' }}>Item total</div>
                <div className="mono" style={{ fontSize: '17px', fontWeight: 600 }}>Rs {fmt(lineTotal)}</div>
              </div>
              <button className="btn-primary" onClick={confirm}>Add to cart</button>
            </div>
          </div>
        </div>
      );
    };

    const FullMenuModal = ({ menu, picks, onAdd, onRemove, onClose, onHandoff }) => {
      if (!menu) return null;

      const inPicks = (id) => picks.some(p => p.id === id);
      const bill = computeBill(picks);

      // The pizza currently being configured (size / crust / toppings), or null.
      const [configuring, setConfiguring] = useState(null);

      const crusts = menu.crusts || [];
      const addOns = menu.add_ons || [];

      // Count how many cart lines came from a given base pizza id.
      const pizzaCount = (baseId) => picks.filter(p => p.baseId === baseId).reduce((n, p) => n + (p.quantity || 1), 0);

      // Simple add/remove row for non-pizza items (sides, drinks, desserts, deals).
      const Row = ({ id, name, desc, price, priceLabel }) => (
        <div className="menu-row">
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: '14.5px', fontWeight: 500 }}>{name}</div>
            {desc && <div style={{ fontSize: '12px', color: 'var(--faint)', marginTop: '3px', lineHeight: 1.45 }}>{desc}</div>}
          </div>
          <div className="mono" style={{ fontSize: '12.5px', color: 'var(--text)', whiteSpace: 'nowrap' }}>
            {priceLabel || `Rs ${fmt(price)}`}
          </div>
          <button
            className={`add-btn ${inPicks(id) ? 'added' : ''}`}
            title={inPicks(id) ? 'Remove from cart' : 'Add to cart'}
            onClick={() => inPicks(id) ? onRemove(id) : onAdd({ id, baseId: id, baseName: name, name, unitPrice: price, quantity: 1, price })}>
            {inPicks(id) ? '✓' : '+'}
          </button>
        </div>
      );

      // Pizza row — opens the configurator instead of adding directly.
      const PizzaRow = ({ pizza, priceLabel }) => {
        const count = pizzaCount(pizza.id);
        return (
          <div className="menu-row">
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: '14.5px', fontWeight: 500 }}>{pizza.name}</div>
              {pizza.description && <div style={{ fontSize: '12px', color: 'var(--faint)', marginTop: '3px', lineHeight: 1.45 }}>{pizza.description}</div>}
            </div>
            <div className="mono" style={{ fontSize: '12.5px', color: 'var(--text)', whiteSpace: 'nowrap' }}>{priceLabel}</div>
            <button
              className={`add-btn ${count > 0 ? 'added' : ''}`}
              title="Choose size, crust & toppings"
              onClick={() => setConfiguring(pizza)}>
              {count > 0 ? count : '+'}

    // ─── Main App ─────────────────────────────────────────────────────────────────
    function App() {

      const [messages, setMessages] = useState([]);

                { id: 'p2', name: 'Chicken Fajita', description: 'Tender chicken fajita with onion and green pepper notes', popular: true, prices: { Small: 899, Medium: 1399, Large: 1999 },
                  crust_prices: { Small: { Pan: 899, 'Stuffed Crust': 1099, 'Thin Crust': 999 }, Medium: { Pan: 1399, 'Stuffed Crust': 1699, 'Thin Crust': 1499 }, Large: { Pan: 1999, 'Stuffed Crust': 2399, 'Thin Crust': 2199 } } },
                { id: 'p3', name: 'Chicken Supreme', description: 'Loaded chicken pizza with premium toppings', popular: true, prices: { Small: 999, Medium: 1499, Large: 2199 },
                  crust_prices: { Small: { Pan: 999, 'Stuffed Crust': 1199, 'Thin Crust': 1099 }, Medium: { Pan: 1499, 'Stuffed Crust': 1799, 'Thin Crust': 1599 }, Large: { Pan: 2199, 'Stuffed Crust': 2599, 'Thin Crust': 2399 } } },
                { id: 'p4', name: 'Pepperoni', description: 'Classic pepperoni pizza with rich tomato base', popular: false, prices: { Small: 1099, Medium: 1599, Large: 2299 },
                  crust_prices: { Small: { Pan: 1099, 'Stuffed Crust': 1299, 'Thin Crust': 1199 }, Medium: { Pan: 1599, 'Stuffed Crust': 1899, 'Thin Crust': 1699 }, Large: { Pan: 2299, 'Stuffed Crust': 2699, 'Thin Crust': 2499 } } },
              ],
              crusts: [
                { id: 'c1', name: 'Pan', extra_price: 0 },

                { id: 'c3', name: 'Stuffed Crust', extra_price: 400 },

              ],

                { id: 'd1', name: 'My Box Deal', description: '1 Personal Pizza + Fries + 1 Drink', price: 699, saves: 0 },
                { id: 'd2', name: 'Medium Duo Deal', description: '2 Medium Pizzas', price: 2499, saves: 0 },
                { id: 'd3', name: 'Family Feast Deal', description: '2 Large Pizzas + Garlic Bread + 1.5L Drink', price: 3999, saves: 0 },
                { id: 'd4', name: 'WOW Deal', description: '1 Medium Pizza + Garlic Bread + 1 Drink', price: 1599, saves: 0 },
              ]
            });
          });
      }, []);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages, isTyping]);

      useEffect(() => {
        let cancelled = false;
        const initVapi = async () => {
          try {
            const VapiClient = await window.__VapiClientPromise;
            if (!VapiClient) throw new Error('Vapi module did not export a client');
            const vapi = new VapiClient(VAPI_PUBLIC_KEY);
            if (cancelled) return;
            vapiRef.current = vapi;

            vapi.on('call-start', () => {
              setCallStatus('connected');
              setError(null);
              // No injected greeting — Sarah's spoken first message arrives via the
              // transcript stream and is shown as a single merged bubble.
            });
            vapi.on('call-end', () => {
              setCallStatus('ended');
              setIsTyping(false);
            });
            vapi.on('speech-start', () => {
              setCallStatus('speaking');
              setIsTyping(false);
            });
            vapi.on('speech-end', () => {
              setCallStatus('connected');
            });
            vapi.on('message', (msg) => {
              if (msg.type === 'transcript') {
                const role = msg.role === 'user' ? 'user' : 'sarah';
                const text = (msg.transcript || '').trim();
                if (!text) return;
                if (msg.transcriptType === 'partial') {
                  if (role === 'user') setCallStatus('listening');
                  upsertTurn(role, text, false);
                } else if (msg.transcriptType === 'final') {
                  upsertTurn(role, text, true);
                  if (role === 'user') {
                    setCallStatus('processing');
                  } else {
                    setIsTyping(false);
                    setCallStatus('speaking');
                  }
                  // Run order detection on BOTH speakers' final turns so a
                  // confirmation from either side reliably places the order.
                  handleFinalTranscript(role, text);
                }
              }
              if (msg.type === 'function-call' || msg.type === 'tool-call') {
                setCallStatus('processing');
                setIsTyping(true);
              }
            });
            vapi.on('error', (e) => {
              console.error('Vapi error:', e);
              setError('Voice connection error. Please try again.');
              setCallStatus('idle');
            });
            setVapiReady(true);
          } catch (e) {
            console.error('Vapi init error', e);
            setError('Could not initialize voice SDK. Check API key and browser console.');
          }
        };
        initVapi();
        return () => {
          cancelled = true;
          if (vapiRef.current) vapiRef.current.stop();
        };
      }, []);

      // Merge a speaker's transcript segments into a single "turn" bubble:
      // partials update the live bubble, finals are appended to it, and a new
      // bubble only starts when the other speaker takes over. This keeps each
      // turn as one message instead of many small chunks.
      const upsertTurn = useCallback((role, text, isFinal) => {
        setMessages(prev => {
          const last = prev[prev.length - 1];
          if (last && last.role === role && last.live) {
            const finals = isFinal ? [last.finals, text].filter(Boolean).join(' ') : last.finals;
            const content = isFinal ? finals : [last.finals, text].filter(Boolean).join(' ');
            return [...prev.slice(0, -1), { ...last, finals, content }];
          }
          // close any previous live bubble, then open a fresh turn
          const closed = last && last.live
            ? [...prev.slice(0, -1), { ...last, live: false }]
            : prev;
          return [...closed, { role, content: text, finals: isFinal ? text : '', live: true, ts: Date.now() }];
        });
      }, []);

      // Build a confirmed order straight from the customer's cart picks and show
      // it (with the full bill) in the "Your order" panel. This is the reliable
      // path: it doesn't depend on the assistant naming each item out loud.
      const placeOrderFromPicks = useCallback((picks) => {
        if (!picks || !picks.length) return;
        setShowConfirm(true);
        const bill = computeBill(picks);
        const items = picks.map(p => ({
          pizza: p.baseName || p.name,
          size: p.size || '',
          crust: p.crust || '',
          quantity: p.quantity || 1,
          add_ons: p.addOns || [],
          total: p.price,
        }));
        const result = {
          order_id: 'PHT-' + Math.random().toString(36).slice(2, 8).toUpperCase(),
          customer_name: profileRef.current?.name || 'Valued Customer',
          items,
          summary: {
            subtotal: bill.subtotal,
            delivery_fee: bill.deliveryFee,
            tax: bill.tax,
            grand_total: bill.grandTotal,
            currency: 'PKR',
          },
          estimated_time: '30-45 minutes',
        };
        setTimeout(() => { setOrder(result); setShowConfirm(false); }, 900);
      }, []);

      // Scan one transcript line against the whole menu and remember any items
      // mentioned, so a voice-only order (no on-screen cart) can still be shown.
      const scanForItems = useCallback((lower) => {
        const menu = menuRef.current;
        if (!menu) return;
        const sizes = ['Small', 'Medium', 'Large'];
        const size = sizes.find(s => lower.includes(s.toLowerCase()));
        const consider = [
          ...(menu.pizzas || []).map(p => ({ ...p, kind: 'pizza' })),
          ...(menu.sides || []).map(p => ({ ...p, kind: 'side' })),
          ...(menu.drinks || []).map(p => ({ ...p, kind: 'drink' })),
          ...(menu.desserts || []).map(p => ({ ...p, kind: 'dessert' })),
          ...(menu.deals || []).map(p => ({ ...p, kind: 'deal' })),
        ];
        consider.forEach(it => {
          if (!it.name || !lower.includes(it.name.toLowerCase())) return;
          const chosenSize = it.kind === 'pizza' ? (size || 'Medium') : '';
          const price = it.prices ? (it.prices[chosenSize] || it.prices.Medium) : it.price;
          const prev = detectedItemsRef.current[it.name];
          detectedItemsRef.current[it.name] = {
            name: it.name,
            size: chosenSize || (prev && prev.size) || '',
            price: Number(price) || 0,
            quantity: prev ? prev.quantity : 1,
          };
        });
      }, []);

      // Build + show a confirmed order from items detected in the conversation.
      const placeOrderFromDetected = useCallback(() => {
        const items = Object.values(detectedItemsRef.current);
        if (!items.length) return false;
        setShowConfirm(true);
        const bill = computeBill(items.map(i => ({ price: i.price * (i.quantity || 1) })));
        const lines = items.map(i => ({
          pizza: i.name,
          size: i.size || '',
          crust: '',
          quantity: i.quantity || 1,
          add_ons: [],
          total: i.price * (i.quantity || 1),
        }));
        const result = {
          order_id: 'PHT-' + Math.random().toString(36).slice(2, 8).toUpperCase(),
          customer_name: profileRef.current?.name || 'Valued Customer',
          items: lines,
          summary: {
            subtotal: bill.subtotal, delivery_fee: bill.deliveryFee,
            tax: bill.tax, grand_total: bill.grandTotal, currency: 'PKR',
          },
          estimated_time: '30-45 minutes',
        };
        setTimeout(() => { setOrder(result); setShowConfirm(false); }, 900);
        return true;
      }, []);

      // Decide, from a final transcript turn, whether the order is being placed.
      const handleFinalTranscript = useCallback((role, text) => {
        const lower = text.toLowerCase();
        if (role === 'sarah') lastSarahRef.current = lower;
        scanForItems(lower);          // keep a running tally of mentioned items
        if (orderRef.current) return; // already placed — don't place twice
        const picks = picksRef.current;

        // Strong "the order is being placed" signal from the assistant.
        const placedByAssistant = role === 'sarah' && /(plac(e|ing|ed)\s+(your\s+|the\s+)?order|order\s+(is\s+)?(confirmed|placed)|send(ing)?\s+(it|this|your order)?\s*to the kitchen|you'?re all set|on (its|the) way)/.test(lower);
        // Customer explicitly asks to place/confirm the order.
        const explicitUser = role === 'user' && /(place (the |my )?order|confirm (the |my )?order|go ahead and order)/.test(lower);
        // A bare "yes" only counts if the assistant just asked to confirm the order.
        const sarahAskedToConfirm = /(confirm|plac|ready).*order|order.*(confirm|\?)|shall i (place|order)|should i place/.test(lastSarahRef.current);
        const bareYes = role === 'user' && /^(yes|yep|yeah|sure|correct|confirm|go ahead|sounds good|do it|place it|that'?s right|absolutely|ok|okay)\b/.test(lower);

        if (placedByAssistant || explicitUser || (bareYes && sarahAskedToConfirm)) {
          // Prefer the on-screen cart; otherwise fall back to what was said aloud.
          if (picks && picks.length) { placeOrderFromPicks(picks); return; }
          if (placeOrderFromDetected()) return;
        }
      }, [placeOrderFromPicks, placeOrderFromDetected, scanForItems]);

      const startCall = useCallback(async () => {
        if (!vapiRef.current) { setError('Voice not ready yet. Please wait…'); return; }
        setCallStatus('connecting');
        setMessages([]);
        setOrder(null);
        setError(null);
        detectedItemsRef.current = {};
        lastSarahRef.current = '';
        try {
          const p = profileRef.current;
          const picked = picksRef.current;
          let overrides;
          if (p) {
            const pickLine = picked && picked.length
              ? ` I see you were just looking at ${picked.map(x => x.baseName || x.name).join(', ')} — want to start there?`
              : ' What can I get started for you today?';
            overrides = {
              // These are passed to the assistant so it can read the saved number
              // and address back at the END, when confirming the order — not now.
              variableValues: {
                // Use the exact name from the saved profile, with its exact spelling.
                customerName: p.name,
                // Letter-by-letter spelling so the assistant pronounces / confirms the
                // name exactly as the customer saved it (e.g. "A-L-I  K-H-A-N").
                customerNameSpelled: spellOut(p.name),
                customerPhone: p.phone,
                customerAddress: p.address,
                customerEmail: p.email,
                menuPicks: (picked || []).map(x => x.name).join(', '),
                // Flags + a ready-made summary the dashboard prompt can drop in so it
                // CONFIRMS saved details instead of asking the customer to provide them.
                isReturningCustomer: 'true',
                hasSavedDetails: 'true',
                customerProfile: `Name: ${p.name}; Phone: ${p.phone}; Address: ${p.address}; Email: ${p.email}`,
              },
              // Opening line is just a warm greeting — no detail read-back up front.
              firstMessage: `Hi ${p.name}! Welcome back to Pizza Hut — I'm Sarah.` + pickLine,
            };
          }
          await vapiRef.current.start(VAPI_ASSISTANT_ID, overrides);
        } catch (e) {
          console.error(e);
          setError('Could not start call. Please try again.');
          setCallStatus('idle');
        }
      }, []);

      const handleMicClick = useCallback(async () => {
        if (!vapiRef.current) { setError('Voice not ready yet. Please wait…'); return; }
        if (callStatus === 'idle' || callStatus === 'ended') {
          await startCall();
        } else if (callStatus === 'listening') {
          vapiRef.current.setMuted(true);
          setCallStatus('connected');
        } else if (callStatus === 'connected') {
          vapiRef.current.setMuted(false);
          setCallStatus('listening');
        }
      }, [callStatus, startCall]);

      const handleEndCall = useCallback(() => {
        if (vapiRef.current) vapiRef.current.stop();
        setCallStatus('ended');
        setIsTyping(false);
      }, []);

      const handleSaveProfile = useCallback((p) => {
        saveProfile(p);
        setProfile(p);
        setShowRegister(false);
      }, []);

      const addPick = useCallback((item) => {
        setPicks(prev => {
          const i = prev.findIndex(p => p.id === item.id);
          if (i === -1) return [...prev, item];
          // Same configuration already in cart — bump the quantity instead of duplicating.
          const next = [...prev];
          const qty = (next[i].quantity || 1) + (item.quantity || 1);
          const unit = next[i].unitPrice ?? next[i].price;
          next[i] = { ...next[i], quantity: qty, unitPrice: unit, price: unit * qty };
          return next;
        });
      }, []);
      const removePick = useCallback((id) => {
        setPicks(prev => prev.filter(p => p.id !== id));
      }, []);

      const handoffToSarah = useCallback(() => {
        setShowMenu(false);
        if (callStatus === 'idle' || callStatus === 'ended') {
          setTimeout(() => startCall(), 200);
        }
      }, [callStatus, startCall]);

      const statusLabel = {
        idle: 'Tap mic to start',
        connecting: 'Connecting to the assistant…',
        connected: 'Connected — tap to speak',
        listening: 'Listening…',
        processing: 'Processing…',
        speaking: 'Assistant is speaking…',
        ended: 'Call ended — tap to restart'
      }[callStatus] || '';

      const statusClass = {
        idle: 'status-idle', connecting: 'status-listening', connected: 'status-connected',
        listening: 'status-listening', processing: 'status-listening', speaking: 'status-speaking', ended: 'status-idle'
      }[callStatus] || 'status-idle';

      const micBtnClass = {
        idle: 'mic-btn-idle', connecting: 'mic-btn-processing', connected: 'mic-btn-connected',
        listening: 'mic-btn-listening', processing: 'mic-btn-processing', speaking: 'mic-btn-speaking', ended: 'mic-btn-idle'
      }[callStatus] || 'mic-btn-idle';

      const isActive = ['connecting', 'connected', 'listening', 'processing', 'speaking'].includes(callStatus);

      return (
        <div style={{ minHeight: '100vh', position: 'relative' }}>
          {showIntro && <IntroLoader name={profile?.name ? profile.name.split(' ')[0] : null} onDone={() => setShowIntro(false)} />}

          <div className="app-shell" style={{ position: 'relative', maxWidth: '1080px', margin: '0 auto', padding: '28px 20px 16px' }}>
            {/* Header */}
            <header style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '40px', gap: '12px', flexWrap: 'wrap', paddingBottom: '20px', borderBottom: '1px solid var(--line)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                <div style={{ width: '36px', height: '36px', background: 'var(--red)', borderRadius: '9px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff' }}><SliceMark size={20} /></div>
                <div style={{ fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, fontSize: '17px', letterSpacing: '-0.02em' }}>Pizza Hut</div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
                <button className="pill-btn" onClick={() => setShowMenu(true)}><GridIcon /> Menu</button>
                <button className="pill-btn" onClick={() => setShowRegister(true)}>
                  <UserIcon /> {profile ? profile.name.split(' ')[0] : 'Sign up'}
                </button>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', border: '1px solid var(--line)', borderRadius: '8px', padding: '8px 13px' }}>
                  <span className={`status-dot ${statusClass}`} />
                  <span style={{ fontSize: '12px', color: 'var(--muted)', whiteSpace: 'nowrap' }}>{statusLabel}</span>
                </div>
              </div>
            </header>

            {/* Hero */}
            <div style={{ marginBottom: '32px', maxWidth: '560px' }}>
              <div className="eyebrow" style={{ marginBottom: '14px' }}>Voice ordering · AI assistant</div>
              <h1 className="font-display" style={{ fontWeight: 600, fontSize: 'clamp(30px, 6vw, 46px)', lineHeight: 1.04 }}>
                Order by voice.
              </h1>
              <p style={{ fontSize: '15px', color: 'var(--muted)', marginTop: '14px', lineHeight: 1.55 }}>
                Talk to our AI ordering assistant. It confirms your details and places the order — no forms, no typing.
              </p>
            </div>

            {error && (
              <div style={{ background: 'var(--red-soft)', border: '1px solid var(--red-line)', borderRadius: '10px', padding: '12px 16px', marginBottom: '20px', fontSize: '13px', color: '#FF9A92' }}>
                {error}
              </div>
            )}

            {/* Main Grid */}
            <div className="main-grid">
              {/* Left Column */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                {/* Chat Panel */}
                <div className="panel" style={{ borderRadius: '16px', padding: '0', overflow: 'hidden' }}>
                  <div style={{ padding: '15px 20px', borderBottom: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: '10px' }}>
                    <span className="eyebrow">Conversation</span>
                    {callStatus === 'speaking' && (
                      <div style={{ marginLeft: 'auto' }}><SoundWave active={true} color="var(--red)" /></div>
                    )}
                  </div>
                  <div ref={chatRef} className="scrollable chat-scroll" style={{ padding: '20px' }}>
                    {messages.length === 0 && (
                      <div style={{ textAlign: 'center', padding: '44px 20px', color: 'var(--faint)' }}>
                        <div className="mic-icon-blink" style={{ display: 'flex', justifyContent: 'center', marginBottom: '14px' }}><MicIcon /></div>
                        <div style={{ fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, marginBottom: '8px', color: 'var(--muted)', fontSize: '14px' }}>Tap the mic to start</div>
                        <div style={{ fontSize: '12.5px', lineHeight: 1.6 }}>Your conversation with the assistant appears here</div>
                      </div>
                    )}
                    {messages.map((m, i) => <ChatBubble key={i} msg={m} userName={profile?.name} />)}
                    {isTyping && <TypingIndicator />}
                  </div>
                </div>

                {/* Mic Control */}
                <div className="panel" style={{ borderRadius: '16px', padding: '32px 20px', textAlign: 'center' }}>
                  <div style={{ position: 'relative', display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: '20px' }}>
                    {callStatus === 'listening' && (
                      <>
                        <div className="pulse-ring" style={{ position: 'absolute', width: '84px', height: '84px', borderRadius: '50%', border: '1px solid var(--red)', top: 0, left: '50%' }} />
                        <div className="pulse-ring" style={{ position: 'absolute', width: '84px', height: '84px', borderRadius: '50%', border: '1px solid var(--red)', top: 0, left: '50%', animationDelay: '0.5s' }} />
                      </>
                    )}
                    <button onClick={handleMicClick} className={micBtnClass}
                      style={{ width: '84px', height: '84px', borderRadius: '50%', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: callStatus === 'processing' ? 'var(--muted)' : '#fff', transition: 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)', transform: callStatus === 'listening' ? 'scale(1.06)' : 'scale(1)' }}>
                      {callStatus === 'connecting' ? (
                        <div style={{ width: '22px', height: '22px', border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin-slow 0.7s linear infinite' }} />
                      ) : callStatus === 'listening' ? (
                        <SoundWave active={true} />
                      ) : (
                        <MicIcon />
                      )}
                    </button>
                    <div style={{ fontSize: '13px', color: 'var(--muted)' }}>{statusLabel}</div>
                    {isActive && (
                      <button onClick={handleEndCall} className="pill-btn" style={{ gap: '8px' }}>
                        <PhoneOff /> End call
                      </button>
                    )}
                  </div>
                </div>
              </div>

              {/* Right Column */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                {profile && (
                  <>
                    <div className="eyebrow" style={{ paddingLeft: '2px' }}>Your profile</div>
                    <ProfileCard profile={profile} onEdit={() => setShowRegister(true)} />
                  </>
                )}

                <div className="eyebrow" style={{ paddingLeft: '2px', marginTop: profile ? '6px' : 0 }}>Your order</div>
                <OrderSummary order={order} loading={orderLoading} />
                <div className="eyebrow" style={{ paddingLeft: '2px', marginTop: '6px' }}>Menu highlights</div>
                <MenuPreview menu={menu} onBrowse={() => setShowMenu(true)} />
              </div>
            </div>

            {/* Footer */}
            <div style={{ textAlign: 'center', marginTop: '44px', paddingTop: '20px', borderTop: '1px solid var(--line)', color: 'var(--dim)', fontSize: '11px' }}>
              <span className="mono" style={{ letterSpacing: '0.06em' }}>PIZZA HUT · SARAH · AI ORDERING</span>
            </div>
          </div>

          {/* Registration modal */}
          {showRegister && (
            <RegisterModal
              initial={profile}
              canSkip={!!profile || true}
              onSave={handleSaveProfile}
              onClose={() => setShowRegister(false)}
            />
          )}

          {/* Full menu browse modal */}
          {showMenu && (
            <FullMenuModal
              menu={menu}
              picks={picks}
              onAdd={addPick}
              onRemove={removePick}
              onClose={() => setShowMenu(false)}
              onHandoff={handoffToSarah}
            />
          )}

          {/* Order Confirm Overlay */}
          {showConfirm && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.78)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100, padding: '20px' }}>
              <div className="panel" style={{ borderRadius: '18px', padding: '34px', maxWidth: '340px', width: '100%', textAlign: 'center' }}>
                <div style={{ color: 'var(--red)', display: 'flex', justifyContent: 'center', marginBottom: '18px' }}><BagIcon size={30} /></div>
                <div style={{ fontFamily: 'Inter Tight, sans-serif', fontWeight: 600, fontSize: '18px', marginBottom: '8px' }}>Placing your order</div>
                <div style={{ fontSize: '13px', color: 'var(--muted)' }}>The assistant is confirming your order with the kitchen…</div>
                <div style={{ marginTop: '24px', display: 'flex', justifyContent: 'center' }}>
                  <div style={{ width: '30px', height: '30px', border: '2px solid var(--line-strong)', borderTopColor: 'var(--red)', borderRadius: '50%', animation: 'spin-slow 0.8s linear infinite' }} />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
